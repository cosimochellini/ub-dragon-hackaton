# Netlify build settings for the TanStack Start (SSR) app.
# The SSR server is bundled into a Netlify serverless function by
# @netlify/vite-plugin-tanstack-start (configured in vite.config.ts);
# `publish` serves the static client assets and the plugin wires the
# catch-all redirect to the server function.
[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22.12"

# User-defined Netlify Functions (none yet). The SSR handler is emitted
# automatically by the plugin and lives outside this directory.
[functions]
  directory = "netlify/functions"

# NOTE: indexing is suppressed via the page-level `<meta name="robots"
# content="noindex, nofollow">` in src/routes/__root.tsx, which is rendered
# into every SSR HTML response and is the authoritative signal for crawlers.
# A `[[headers]]` X-Robots-Tag is intentionally NOT used: these rules do not
# apply to the catch-all-redirect HTML served by the SSR function (they would
# only tag static assets — e.g. the OG image, which must stay fetchable).
# Heads-up: Netlify auto-injects `X-Robots-Tag: noindex` on Deploy Previews, so
# don't "confirm" the meta-only approach against a preview — that header is
# Netlify's and is absent on production, where the meta tag is the sole signal.
